query ParentLeaveRequests($studentId: ID, $status: LeaveRequestStatusEnum) {
  parentLeaveRequests(studentId: $studentId, status: $status) {
    id
    requestType
    startDate
    endDate
    reason
    status
    rejectionReason
    reviewedAt
    student {
      id
      name
    }
    daysCount
    createdAt
  }
}

query TeacherStudentLeaveRequests(
  $classroomId: ID
  $status: LeaveRequestStatusEnum
) {
  leaveRequests(classroomId: $classroomId, status: $status) {
    id
    requestType
    startDate
    endDate
    reason
    status
    rejectionReason
    reviewedAt
    student {
      id
      name
    }
    parent {
      id
      name
    }
    daysCount
    createdAt
  }
}
