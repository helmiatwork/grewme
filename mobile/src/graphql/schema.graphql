# GrewMe GraphQL Schema (mobile-relevant subset)
# Regenerate from backend: bundle exec rails graphql:schema:dump
# This file is a manually curated subset for offline codegen.
# Update when backend schema changes.

scalar ISO8601Date
scalar ISO8601DateTime

enum SkillCategoryEnum {
  READING
  MATH
  WRITING
  LOGIC
  SOCIAL
}

# --- User types ---

type TeacherType {
  id: ID!
  name: String!
  email: String!
  role: String!
  classrooms: [ClassroomType!]!
}

type ParentType {
  id: ID!
  name: String!
  email: String!
  role: String!
  children: [StudentType!]!
}

union UserUnion = TeacherType | ParentType

type StudentType {
  id: ID!
  name: String!
  avatar: String
  classrooms: [ClassroomType!]!
}

# --- School & Classroom ---

type SchoolType {
  id: ID!
  name: String!
}

type ClassroomType {
  id: ID!
  name: String!
  grade: Int
  school: SchoolType!
}

# --- Radar & Progress ---

type RadarSkillType {
  reading: Float
  math: Float
  writing: Float
  logic: Float
  social: Float
}

type RadarDataType {
  studentId: ID!
  studentName: String!
  skills: RadarSkillType!
}

type ProgressWeekType {
  period: String!
  skills: RadarSkillType!
}

type ProgressDataType {
  weeks: [ProgressWeekType!]!
}

type ClassroomOverviewType {
  classroomId: ID!
  classroomName: String!
  students: [RadarDataType!]!
}

# --- Daily Scores (connection) ---

type DailyScoreType {
  id: ID!
  date: ISO8601Date!
  skillCategory: SkillCategoryEnum!
  score: Int!
  notes: String
  studentId: ID!
}

type DailyScoreTypeEdge {
  node: DailyScoreType!
  cursor: String!
}

type PageInfo {
  endCursor: String
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
}

type DailyScoreTypeConnection {
  edges: [DailyScoreTypeEdge!]!
  pageInfo: PageInfo!
}

# --- Behavior ---

type BehaviorCategoryType {
  id: ID!
  name: String!
  description: String
  pointValue: Int!
  isPositive: Boolean!
  icon: String!
  color: String!
  position: Int!
}

type BehaviorPointType {
  id: ID!
  pointValue: Int!
  note: String
  awardedAt: ISO8601DateTime!
  revokedAt: ISO8601DateTime
  revokable: Boolean!
  student: StudentType!
  teacher: TeacherType!
  behaviorCategory: BehaviorCategoryType!
}

type ClassroomBehaviorStudentType {
  student: StudentType!
  totalPoints: Int!
  positiveCount: Int!
  negativeCount: Int!
  recentPoints: [BehaviorPointType!]!
}

# --- Attendance ---

enum AttendanceStatusEnum {
  PRESENT
  SICK
  EXCUSED
  UNEXCUSED
}

type AttendanceType {
  id: ID!
  date: ISO8601Date!
  status: AttendanceStatusEnum!
  notes: String
  student: StudentType!
  classroom: ClassroomType!
  createdAt: ISO8601DateTime!
  updatedAt: ISO8601DateTime!
}

input AttendanceRecordInput {
  studentId: ID!
  status: AttendanceStatusEnum!
  notes: String
}

type BulkRecordAttendancePayload {
  attendances: [AttendanceType!]!
  errors: [UserErrorType!]!
}

# --- Exams ---

enum ExamTypeEnum {
  SCORE_BASED
  MULTIPLE_CHOICE
  RUBRIC
  PASS_FAIL
}

enum ExamSubmissionStatusEnum {
  NOT_STARTED
  IN_PROGRESS
  SUBMITTED
  GRADED
}

enum ClassroomExamStatusEnum {
  DRAFT
  ACTIVE
  CLOSED
}

type ExamQuestionType {
  id: ID!
  questionText: String
  options: String
  correctAnswer: String
  points: Int!
  position: Int!
}

type RubricCriteriaType {
  id: ID!
  name: String!
  description: String
  maxScore: Int!
  position: Int!
}

type RubricScoreType {
  id: ID!
  rubricCriteria: RubricCriteriaType!
  score: Int!
  feedback: String
}

type ExamAnswerType {
  id: ID!
  examQuestion: ExamQuestionType!
  selectedAnswer: String
  correct: Boolean
  pointsAwarded: Int!
}

type ExamObjectType {
  id: ID!
  title: String!
  description: String
  examType: ExamTypeEnum!
  maxScore: Int
  durationMinutes: Int
  topic: TopicCurriculumType!
  examQuestions: [ExamQuestionType!]!
  rubricCriteria: [RubricCriteriaType!]!
  classroomExams: [ClassroomExamType!]!
  createdAt: ISO8601DateTime!
  updatedAt: ISO8601DateTime!
}

type ClassroomExamType {
  id: ID!
  exam: ExamObjectType!
  classroom: ClassroomType!
  status: ClassroomExamStatusEnum!
  scheduledAt: ISO8601DateTime
  dueAt: ISO8601DateTime
  accessCode: String
  durationMinutes: Int
  showResults: Boolean!
  examSubmissions: [ExamSubmissionType!]!
  createdAt: ISO8601DateTime!
  updatedAt: ISO8601DateTime!
}

type ExamSubmissionType {
  id: ID!
  student: StudentType!
  classroomExam: ClassroomExamType!
  status: ExamSubmissionStatusEnum!
  score: Float
  passed: Boolean
  startedAt: ISO8601DateTime
  submittedAt: ISO8601DateTime
  gradedAt: ISO8601DateTime
  teacherNotes: String
  examAnswers: [ExamAnswerType!]!
  rubricScores: [RubricScoreType!]!
  createdAt: ISO8601DateTime!
  updatedAt: ISO8601DateTime!
}

# --- Exam Inputs ---

input ExamQuestionInput {
  questionText: String
  options: String
  correctAnswer: String
  points: Int
  position: Int
}

input RubricCriteriaInput {
  name: String!
  description: String
  maxScore: Int
  position: Int
}

input CreateExamInput {
  title: String!
  description: String
  examType: ExamTypeEnum!
  topicId: ID!
  maxScore: Int
  durationMinutes: Int
  questions: [ExamQuestionInput!]
  rubricCriteria: [RubricCriteriaInput!]
}

input AssignExamInput {
  examId: ID!
  classroomId: ID!
  scheduledAt: ISO8601DateTime
  dueAt: ISO8601DateTime
  durationMinutes: Int
  showResults: Boolean
}

input RubricScoreInput {
  rubricCriteriaId: ID!
  score: Int!
  feedback: String
}

input GradeSubmissionInput {
  examSubmissionId: ID!
  score: Float
  passed: Boolean
  teacherNotes: String
  rubricScores: [RubricScoreInput!]
}

# --- Curriculum ---

type SubjectCurriculumType {
  id: ID!
  name: String!
  description: String
  topics: [TopicCurriculumType!]!
  createdAt: ISO8601DateTime!
  updatedAt: ISO8601DateTime!
}

type TopicCurriculumType {
  id: ID!
  name: String!
  description: String
  position: Int!
  subject: SubjectCurriculumType!
  learningObjectives: [CurriculumLearningObjectiveType!]!
  exams: [ExamObjectType!]!
  createdAt: ISO8601DateTime!
  updatedAt: ISO8601DateTime!
}

type CurriculumLearningObjectiveType {
  id: ID!
  name: String!
  description: String
  examPassThreshold: Int!
  dailyScoreThreshold: Int!
  position: Int!
  createdAt: ISO8601DateTime!
  updatedAt: ISO8601DateTime!
}

type AcademicYearType {
  id: ID!
  label: String!
  startDate: ISO8601Date!
  endDate: ISO8601Date!
  current: Boolean!
  createdAt: ISO8601DateTime!
}

type GradeCurriculumType {
  id: ID!
  grade: Int!
  academicYear: AcademicYearType!
  gradeCurriculumItems: [GradeCurriculumItemType!]!
  createdAt: ISO8601DateTime!
}

type GradeCurriculumItemType {
  id: ID!
  subject: SubjectCurriculumType
  topic: TopicCurriculumType
  position: Int!
  displayName: String!
}

# --- Mastery ---

type LearningObjectiveType {
  id: ID!
  description: String!
  topic: TopicMasteryType!
}

type TopicMasteryType {
  id: ID!
  name: String!
  subject: SubjectMasteryType!
}

type SubjectMasteryType {
  id: ID!
  name: String!
}

type ObjectiveMasteryType {
  id: ID!
  learningObjective: LearningObjectiveType!
  examMastered: Boolean!
  dailyMastered: Boolean!
  mastered: Boolean!
}

# --- Health ---

type HealthCheckupType {
  id: ID!
  measuredAt: ISO8601Date!
  weightKg: Float
  heightCm: Float
  headCircumferenceCm: Float
  bmi: Float
  bmiCategory: String
  notes: String
}

# --- Calendar ---

type ClassroomEventType {
  id: ID!
  title: String!
  description: String
  eventDate: ISO8601Date!
  startTime: String
  endTime: String
  classroom: ClassroomType!
  creatorName: String!
  creatorType: String!
  isMine: Boolean!
  createdAt: ISO8601DateTime!
}

# --- Messaging ---

type MediaAttachmentType {
  url: String!
  filename: String!
  contentType: String!
}

type MessageType {
  id: ID!
  body: String!
  senderName: String!
  senderType: String!
  senderId: ID!
  mine: Boolean!
  createdAt: ISO8601DateTime!
  attachments: [MediaAttachmentType!]!
}

type ConversationType {
  id: ID!
  student: StudentType!
  parent: ParentType!
  teacher: TeacherType!
  lastMessage: MessageType
  unreadCount: Int!
  messages: [MessageType!]!
  createdAt: ISO8601DateTime!
}

# --- Leave Requests ---

enum LeaveRequestTypeEnum {
  SICK
  EXCUSED
}

enum LeaveRequestStatusEnum {
  PENDING
  APPROVED
  REJECTED
}

type LeaveRequestType {
  id: ID!
  requestType: LeaveRequestTypeEnum!
  startDate: ISO8601Date!
  endDate: ISO8601Date!
  reason: String!
  status: LeaveRequestStatusEnum!
  rejectionReason: String
  reviewedAt: ISO8601DateTime
  student: StudentType!
  parent: ParentType!
  reviewedBy: TeacherType
  daysCount: Int!
  createdAt: ISO8601DateTime!
}

# --- Account Deletion ---

type AccountDeletionRequestType {
  id: ID!
  status: String!
  gracePeriodEndsAt: ISO8601DateTime!
  completedAt: ISO8601DateTime
  reason: String
  createdAt: ISO8601DateTime!
}

# --- Shared error type ---

type UserErrorType {
  message: String!
  path: [String!]
}

# --- Mutation payloads ---

type LoginPayload {
  accessToken: String
  refreshToken: String
  expiresIn: Int
  user: UserUnion
  errors: [UserErrorType!]!
}

type AwardBehaviorPointPayload {
  behaviorPoint: BehaviorPointType
  dailyTotal: Int!
  errors: [UserErrorType!]!
}

type CreateHealthCheckupPayload {
  healthCheckup: HealthCheckupType
  errors: [UserErrorType!]!
}

type SendMessagePayload {
  message: MessageType
  errors: [UserErrorType!]!
}

type ExportChildDataPayload {
  data: String
  errors: [UserErrorType!]!
}

type RequestChildDataDeletionPayload {
  success: Boolean
  errors: [UserErrorType!]!
}

type RequestAccountDeletionPayload {
  deletionRequest: AccountDeletionRequestType
  errors: [UserErrorType!]!
}

type CreateLeaveRequestPayload {
  leaveRequest: LeaveRequestType
  errors: [UserErrorType!]!
}

type DeleteLeaveRequestPayload {
  success: Boolean!
  errors: [UserErrorType!]!
}

# --- Exam Payloads ---

type CreateExamPayload {
  exam: ExamObjectType
  errors: [UserErrorType!]!
}

type AssignExamPayload {
  classroomExam: ClassroomExamType
  errors: [UserErrorType!]!
}

type GradeExamSubmissionPayload {
  examSubmission: ExamSubmissionType
  errors: [UserErrorType!]!
}

# --- Root types ---

type Query {
  # Parent
  myChildren: [StudentType!]!
  studentRadar(studentId: ID!): RadarDataType!
  studentProgress(studentId: ID!): ProgressDataType!
  studentDailyScores(
    studentId: ID!
    skillCategory: SkillCategoryEnum
    first: Int
    after: String
  ): DailyScoreTypeConnection!

  studentAttendance(
    studentId: ID!
    startDate: ISO8601Date
    endDate: ISO8601Date
  ): [AttendanceType!]!
  studentHealthCheckups(
    studentId: ID!
    startDate: ISO8601Date
    endDate: ISO8601Date
  ): [HealthCheckupType!]!
  studentMasteries(studentId: ID!, subjectId: ID): [ObjectiveMasteryType!]!

  # Curriculum
  subjects(schoolId: ID!): [SubjectCurriculumType!]!
  subject(id: ID!): SubjectCurriculumType
  topic(id: ID!): TopicCurriculumType
  academicYears(schoolId: ID!): [AcademicYearType!]!
  gradeCurriculum(academicYearId: ID!, grade: Int!): GradeCurriculumType

  # Teacher
  classrooms: [ClassroomType!]!
  classroomOverview(classroomId: ID!): ClassroomOverviewType!
  classroomBehaviorToday(classroomId: ID!): [ClassroomBehaviorStudentType!]!
  classroomAttendance(classroomId: ID!, date: ISO8601Date!): [AttendanceType!]!
  behaviorCategories(schoolId: ID!): [BehaviorCategoryType!]!
  studentBehaviorHistory(
    studentId: ID!
    startDate: ISO8601Date
    endDate: ISO8601Date
  ): [BehaviorPointType!]!

  # Calendar
  classroomEvents(
    month: ISO8601Date!
    classroomIds: [ID!]
  ): [ClassroomEventType!]!

  # Messaging
  conversations: [ConversationType!]!
  conversation(id: ID!): ConversationType!

  # Leave Requests (parent)
  parentLeaveRequests(
    studentId: ID
    status: LeaveRequestStatusEnum
  ): [LeaveRequestType!]!

  # Exams
  exam(id: ID!): ExamObjectType
  classroomExams(classroomId: ID!, status: ClassroomExamStatusEnum): [ClassroomExamType!]!
  examSubmission(id: ID!): ExamSubmissionType
}

type Mutation {
  login(email: String!, password: String!, role: String!): LoginPayload!
  awardBehaviorPoint(
    studentId: ID!
    classroomId: ID!
    behaviorCategoryId: ID!
    note: String
  ): AwardBehaviorPointPayload!
  createHealthCheckup(
    studentId: ID!
    measuredAt: ISO8601Date!
    weightKg: Float
    heightCm: Float
    headCircumferenceCm: Float
    notes: String
  ): CreateHealthCheckupPayload!
  sendMessage(
    conversationId: ID!
    body: String!
  ): SendMessagePayload!

  # Data Rights (COPPA)
  exportChildData(studentId: ID!): ExportChildDataPayload!
  requestChildDataDeletion(studentId: ID!): RequestChildDataDeletionPayload!
  requestAccountDeletion(reason: String): RequestAccountDeletionPayload!

  # Leave Requests
  createLeaveRequest(
    studentId: ID!
    requestType: LeaveRequestTypeEnum!
    startDate: ISO8601Date!
    endDate: ISO8601Date!
    reason: String!
  ): CreateLeaveRequestPayload!
  deleteLeaveRequest(leaveRequestId: ID!): DeleteLeaveRequestPayload!

  # Attendance
  bulkRecordAttendance(
    classroomId: ID!
    date: ISO8601Date!
    records: [AttendanceRecordInput!]!
  ): BulkRecordAttendancePayload!

  # Exams
  createExam(input: CreateExamInput!): CreateExamPayload!
  assignExamToClassroom(input: AssignExamInput!): AssignExamPayload!
  gradeExamSubmission(input: GradeSubmissionInput!): GradeExamSubmissionPayload!
}
