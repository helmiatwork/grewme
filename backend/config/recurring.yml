# Recurring jobs managed by Solid Queue.
# These run automatically in production when Solid Queue supervisor is active.
# See: https://github.com/rails/solid_queue#recurring-tasks

production:
  clear_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(batch_size: 500, sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  clear_expired_cache:
    command: "SolidCache::Entry.delete_by('created_at < ?', 2.days.ago)"
    schedule: every day at 3am

  clear_old_cable_messages:
    command: "SolidCable::Message.where('created_at < ?', 1.day.ago).delete_all"
    schedule: every day at 4am

  data_retention_cleanup:
    class: DataRetentionCleanupJob
    schedule: every day at 5am

  consent_reminder:
    class: ConsentReminderJob
    schedule: every monday at 9am

  consent_expiry:
    class: ConsentExpiryJob
    schedule: every day at 6am
