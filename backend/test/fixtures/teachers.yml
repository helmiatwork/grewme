<% require 'bcrypt' %>
teacher_alice:
  name: '<%= Teacher.new.tap { |t| t.name = "Alice Teacher" }.ciphertext_for(:name) %>'
  email: '<%= Teacher.new.tap { |t| t.email = "alice@school.test" }.ciphertext_for(:email) %>'
  encrypted_password: <%= BCrypt::Password.create("password123") %>
  school: greenwood

teacher_bob:
  name: '<%= Teacher.new.tap { |t| t.name = "Bob Teacher" }.ciphertext_for(:name) %>'
  email: '<%= Teacher.new.tap { |t| t.email = "bob@school.test" }.ciphertext_for(:email) %>'
  encrypted_password: <%= BCrypt::Password.create("password123") %>
  school: greenwood
